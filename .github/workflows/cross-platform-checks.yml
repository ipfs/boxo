name: Cross-Platform Checks

# Fast cross-compile sanity checks. Catches build-tag and
# platform-specific compile errors on a single Linux runner before the
# heavier per-OS test jobs in `go-test.yml` start. Jobs here use
# `continue-on-error: true` so they surface regressions in the PR check
# list without blocking merges; the per-OS test jobs remain the
# authoritative signal for officially supported targets. Do not add this
# workflow to required status checks in branch protection. Add new
# matrix entries below as new targets need coverage.

on:
  pull_request:
  push:
    branches: ["main", "release"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  cross-build:
    name: build (GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: js,      goarch: wasm }
          - { goos: wasip1,  goarch: wasm }
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: go build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...
